name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        run: |
          VERSION=$(grep -m1 "Version:" vendorhub.php | sed 's/.*Version:[[:space:]]*//')
          STABLE=$(grep -m1 "Stable tag:" readme.txt | awk '{print $3}')

          if [ "$VERSION" != "$STABLE" ]; then
            echo "Plugin header ($VERSION) and readme stable tag ($STABLE) must match."
            exit 1
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$TAG" != "$VERSION" ]; then
              echo "Tag ($TAG) must match plugin version ($VERSION)."
              exit 1
            fi
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="v${VERSION}"
          fi

          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build plugin ZIP
        run: |
          zip -r "vendorhub-woocommerce-${{ steps.release.outputs.tag }}.zip" \
            vendorhub.php readme.txt uninstall.php includes admin \
            -x "*.DS_Store" -x "*.git*"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendorhub-woocommerce-${{ steps.release.outputs.tag }}
          path: vendorhub-woocommerce-${{ steps.release.outputs.tag }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: vendorhub-woocommerce-${{ steps.release.outputs.tag }}.zip
          generate_release_notes: true
